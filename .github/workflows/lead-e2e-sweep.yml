name: Lead — E2E Sweep

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch:

concurrency:
  group: lead-e2e-sweep
  cancel-in-progress: true

jobs:
  sweep:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      pull-requests: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Trigger E2E on PRs with no checks
        run: |
          gh pr list --repo ${{ github.repository }} --state open \
            --json number,headRefName,statusCheckRollup \
            --jq '.[] | select(
              (.headRefName != "main") and
              (.statusCheckRollup | length == 0)
            ) | .headRefName' \
          | while read branch; do
              echo "No checks found on $branch — triggering E2E"
              gh workflow run lead-e2e.yml \
                --repo ${{ github.repository }} \
                --ref "$branch"
              sleep 2
            done
          echo "Sweep complete"
