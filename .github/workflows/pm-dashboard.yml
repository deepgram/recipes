name: PM — Dashboard

on:
  schedule:
    - cron: '37 * * * *'  # Every hour at :37
  workflow_dispatch:

concurrency:
  group: update-recipe-table
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "recipes-bot"
          git config user.email "noreply@deepgram.com"

      - name: Build recipe table
        id: build
        run: |
          python3 << 'PYEOF'
          import json, os, re, subprocess
          from datetime import datetime, timezone
          
          features = json.load(open('.deepgram/features.json'))
          expected = {}
          for product_slug, product in features['products'].items():
              for version, vdata in product['versions'].items():
                  expected[(product_slug, version)] = len(vdata['recipes'])
          
          langs = ['python','javascript','go','dotnet','java','rust','cli']
          lang_display = {'python':'Python','javascript':'JavaScript','go':'Go',
                          'dotnet':'.NET','java':'Java','rust':'Rust','cli':'CLI'}
          
          actual = {}
          # Scan only what is on the merged main branch — use git ls-tree to
          # guarantee we read origin/main, not any local or cached state.
          result = subprocess.run(
              ['git','ls-tree','-r','--name-only','origin/main'],
              capture_output=True, text=True)
          for path in result.stdout.strip().split('\n'):
              if not path.endswith('/README.md'): continue
              parts = path.split('/')
              if len(parts) != 6: continue  # recipes/{lang}/{product}/{version}/{slug}/README.md
              _, lang, product, version, _, _ = parts
              key = (lang, product, version)
              actual[key] = actual.get(key, 0) + 1

          def test_status(lang):
              # Only count test runs from push (merges) or schedule — not PR runs.
              r = subprocess.run(['gh','run','list','--repo','deepgram/recipes',
                  '--workflow',f'lead-test-{lang}.yml','--branch','main','--limit','5',
                  '--json','conclusion,event',
                  '--jq','[.[] | select(.event == "push" or .event == "schedule")] | .[0].conclusion // "none"'],
                  capture_output=True, text=True, timeout=10)
              c = r.stdout.strip().strip('"')
              return {'success':'✅','failure':'❌'}.get(c,'—')
          
          lang_tests = {l: test_status(l) for l in langs}
          
          def cell(lang, product, version):
              got = actual.get((lang, product, version), 0)
              exp = expected.get((product, version), 0)
              if exp == 0: return '—'
              if got == exp: return '✅'
              if got == 0: return '❌'
              return f'{got}/{exp}'
          
          now = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')
          total_expected = sum(expected.values())
          total_actual = {l: sum(actual.get((l,p,v),0) for (p,v) in expected) for l in langs}
          
          header = '| | ' + ' | '.join(lang_display[l] for l in langs) + ' |'
          sep    = '|---|' + '|'.join(['---']*len(langs)) + '|'
          rows = [header, sep]
          
          for product_slug, product in features['products'].items():
              for version, vdata in product['versions'].items():
                  label = f"{product['name']} \`{version}\`"
                  cells = [cell(l, product_slug, version) for l in langs]
                  rows.append(f"| {label} | " + ' | '.join(cells) + ' |')
          
          totals = [f"**{total_actual[l]}/{total_expected}**" for l in langs]
          rows.append('| **Total** | ' + ' | '.join(totals) + ' |')
          tests = [lang_tests[l] for l in langs]
          rows.append('| **Tests** | ' + ' | '.join(tests) + ' |')
          
          table = f"*Last updated {now}*\n\n" + '\n'.join(rows)
          
          content = open('README.md').read()
          new = re.sub(
              r'<!-- recipes-table-start -->.*?<!-- recipes-table-end -->',
              f'<!-- recipes-table-start -->\n{table}\n<!-- recipes-table-end -->',
              content, flags=re.DOTALL)
          open('README.md','w').write(new)
          print("updated")
          PYEOF

      - name: Open PR if README changed
        run: |
          if ! git diff --quiet README.md; then
            BRANCH="pm/recipe-table"
            git checkout -B "$BRANCH"
            git add README.md
            git commit -m "docs: update recipe table"
            git push origin "$BRANCH" --force

            # Use a fixed branch so there is never more than one open PR.
            # Force-push updates it in place; create only if none exists.
            EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
            if [ -z "$EXISTING" ]; then
              PR_URL=$(gh pr create \
                --base main \
                --head "$BRANCH" \
                --title "docs: update recipe table" \
                --body "Automated update of the recipe coverage table in README.md.")
              gh pr merge "$PR_URL" --auto --squash
            else
              echo "Updated existing PR #$EXISTING"
            fi

            # Always re-trigger E2E (required check for merge)
            gh workflow run lead-e2e.yml --ref "$BRANCH"
          else
            echo "README unchanged — nothing to do."
          fi
