name: Test CLI Samples

on:
  pull_request:
    paths:
      - 'samples/cli/**'
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for examples
        id: check
        run: |
          if find samples/cli -name "example_test.sh" 2>/dev/null | grep -q .; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
            echo "No CLI examples found, skipping tests"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Deepgram CLI
        if: steps.check.outputs.has_tests == 'true'
        run: pip install deepctl

      - name: Run tests
        if: steps.check.outputs.has_tests == 'true'
        run: |
          find samples/cli -name "example_test.sh" | sort | while read test_file; do
            echo "Running: $test_file"
            bash "$test_file"
          done
        env:
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
        timeout-minutes: 15
