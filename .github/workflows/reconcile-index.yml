name: Reconcile Index

on:
  schedule:
    - cron: '45 11 * * *'
  workflow_dispatch:

concurrency:
  group: reconcile-index-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "dx-recipes-bot"
          git config user.email "noreply@deepgram.com"

      - name: Run instruction
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-opus-4-6
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep"
          timeout_minutes: 10
          direct_prompt: "Read and execute instructions/reconcile-index.md"
