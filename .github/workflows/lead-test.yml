name: Lead — Test

# Single workflow covering all recipe languages.
#
# detect        — finds which recipes/{language}/ dirs changed in this PR
# test-python   — pytest with --import-mode=importlib
# test-javascript — node --test
# test-go        — go test ./...
# test-dotnet    — dotnet test (per .csproj)
# test-java      — mvn test (per pom.xml)
# test-rust      — cargo test --workspace
# test-cli       — bash example_test.sh for changed recipes only; posts output to PR comment
# e2e-api-check  — REQUIRED GATE: runs real Deepgram API call + validates all jobs

on:
  pull_request:
    types: [opened, synchronize, reopened]
    # No paths filter — every PR needs e2e-api-check to pass.
    # detect scopes language tests to changed recipes only, so
    # docs-only PRs just skip all language tests and run quickly.
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or SHA to test'
        required: false
        default: ''

concurrency:
  group: lead-test-${{ github.event.pull_request.number || inputs.ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write

jobs:
  # ── Detect which language dirs changed ────────────────────────────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_python:     ${{ steps.scan.outputs.has_python }}
      has_javascript: ${{ steps.scan.outputs.has_javascript }}
      has_go:         ${{ steps.scan.outputs.has_go }}
      has_dotnet:     ${{ steps.scan.outputs.has_dotnet }}
      has_java:       ${{ steps.scan.outputs.has_java }}
      has_rust:       ${{ steps.scan.outputs.has_rust }}
      has_cli:        ${{ steps.scan.outputs.has_cli }}
      cli_recipe_dirs: ${{ steps.scan.outputs.cli_recipe_dirs }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || '' }}
          fetch-depth: 0

      - name: Detect changed languages
        id: scan
        run: |
          # Always diff against origin/main — works for both pull_request and
          # workflow_dispatch (where ref points to a specific branch/SHA).
          # If no recipes/** changed, all has_* outputs are false and tests skip.
          CHANGED=$(git diff origin/main...HEAD --name-only 2>/dev/null | grep '^recipes/' || true)

          for lang in python javascript go dotnet java rust cli; do
            if echo "$CHANGED" | grep -q "^recipes/${lang}/"; then
              echo "has_${lang}=true" >> $GITHUB_OUTPUT
              echo "✓ $lang recipes changed"
            else
              echo "has_${lang}=false" >> $GITHUB_OUTPUT
            fi
          done

          # CLI: scope test to only the recipe dirs that changed on this branch
          CLI_DIRS=$(echo "$CHANGED" | grep '^recipes/cli/' | cut -d/ -f1-5 | sort -u | tr '\n' ' ' | xargs || true)
          echo "cli_recipe_dirs=${CLI_DIRS}" >> $GITHUB_OUTPUT
          if [ -n "$CLI_DIRS" ]; then echo "CLI recipe dirs: $CLI_DIRS"; fi

  # ── Python ────────────────────────────────────────────────────────────────
  test-python:
    needs: detect
    if: needs.detect.outputs.has_python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || '' }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r recipes/python/requirements.txt
      - name: Run Python recipe tests
        run: pytest recipes/python/ -v --timeout=60 --import-mode=importlib
        env:
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
        timeout-minutes: 15

  # ── JavaScript ────────────────────────────────────────────────────────────
  test-javascript:
    needs: detect
    if: needs.detect.outputs.has_javascript == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || '' }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd recipes/javascript && npm install
      - name: Run JavaScript recipe tests
        run: cd recipes/javascript && npm test
        env:
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
        timeout-minutes: 15

  # ── Go ───────────────────────────────────────────────────────────────────
  test-go:
    needs: detect
    if: needs.detect.outputs.has_go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || '' }}
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run Go recipe tests
        run: cd recipes/go && go mod download && go test ./... -v -timeout 120s
        env:
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
        timeout-minutes: 15

  # ── .NET ─────────────────────────────────────────────────────────────────
  test-dotnet:
    needs: detect
    if: needs.detect.outputs.has_dotnet == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || '' }}
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Run .NET recipe tests
        run: |
          find recipes/dotnet -name "*.csproj" | while read csproj; do
            dir=$(dirname "$csproj")
            if find "$dir" -name "ExampleTest.cs" | grep -q .; then
              dotnet test "$csproj" --verbosity normal
            fi
          done
        env:
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
        timeout-minutes: 15

  # ── Java ─────────────────────────────────────────────────────────────────
  test-java:
    needs: detect
    if: needs.detect.outputs.has_java == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || '' }}
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Run Java recipe tests
        run: |
          find recipes/java -name "pom.xml" | while read pom; do
            mvn -f "$pom" test --no-transfer-progress
          done
        env:
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
        timeout-minutes: 15

  # ── Rust ─────────────────────────────────────────────────────────────────
  test-rust:
    needs: detect
    if: needs.detect.outputs.has_rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || '' }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Run Rust recipe tests
        run: |
          if find recipes/rust -mindepth 2 -name "Cargo.toml" | grep -q .; then
            cd recipes/rust && cargo test --workspace -- --test-threads=1
          else
            echo "No Rust recipe Cargo.toml files found, skipping"
          fi
        env:
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
        timeout-minutes: 30

  # ── CLI (Deepgram CLI — installed via install.sh) ─────────────────────────
  # Only tests recipes that changed in this PR; posts output as a PR comment.
  test-cli:
    needs: detect
    if: needs.detect.outputs.has_cli == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || '' }}

      - name: Install Deepgram CLI
        run: |
          curl -fsSL https://deepgram.com/install.sh | sh
          echo "$HOME/.deepgram/bin" >> $GITHUB_PATH
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Run CLI recipe tests
        id: run-tests
        run: |
          DIRS="${{ needs.detect.outputs.cli_recipe_dirs }}"
          OUTPUT_FILE="$RUNNER_TEMP/cli-test-output.txt"
          FAILED=false

          for dir in $DIRS; do
            [ -f "$dir/example_test.sh" ] || continue
            echo "── $dir ──" | tee -a "$OUTPUT_FILE"
            # set +e so the runner's -e flag doesn't kill the step on test failure
            set +e
            output=$(bash "$dir/example_test.sh" 2>&1)
            status=$?
            set -e
            printf '%s\n' "$output" | tee -a "$OUTPUT_FILE"
            if [ $status -eq 0 ]; then
              echo "✓ PASSED" | tee -a "$OUTPUT_FILE"
            else
              echo "✗ FAILED" | tee -a "$OUTPUT_FILE"
              FAILED=true
            fi
          done

          [ "$FAILED" = "true" ] && exit 1 || exit 0
        env:
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
        timeout-minutes: 15

      - name: Post test results to PR
        if: always()
        uses: actions/github-script@v7
        env:
          RUNNER_TEMP: ${{ runner.temp }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const outputFile = path.join(process.env.RUNNER_TEMP, 'cli-test-output.txt');

            let output = '';
            try {
              output = fs.readFileSync(outputFile, 'utf8').trim();
            } catch(e) {
              output = 'No test output captured.';
            }
            if (!output) return; // nothing to post

            if (output.length > 60000) {
              output = output.slice(0, 60000) + '\n... (truncated)';
            }

            // Resolve PR number: from pull_request event or by looking up the branch
            let prNumber = context.issue.number;
            if (!prNumber) {
              const branch = context.ref.replace('refs/heads/', '');
              const { data: prs } = await github.rest.pulls.list({
                ...context.repo,
                head: `${context.repo.owner}:${branch}`,
                state: 'open',
              });
              prNumber = prs[0] && prs[0].number;
            }
            if (!prNumber) return; // no open PR for this branch

            const passed = '${{ steps.run-tests.outcome }}' === 'success';
            const icon = passed ? '✅' : '❌';
            const marker = '<!-- cli-test-results -->';
            const body = `${marker}\n## ${icon} CLI Recipe Tests\n\n\`\`\`\n${output}\n\`\`\``;

            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: prNumber,
                body,
              });
            }

  # ── Required gate ─────────────────────────────────────────────────────────
  # This is the check the ruleset requires. Always runs. Also executes the
  # global E2E test (real Deepgram API call) before evaluating language jobs.
  # skipped = language had no changes → fine
  # success = tests passed → fine
  # failure / cancelled = block merge
  e2e-api-check:
    needs: [detect, test-python, test-javascript, test-go, test-dotnet, test-java, test-rust, test-cli]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || '' }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run E2E API test
        run: |
          pip install "deepgram-sdk>=6.0.0" pytest -q
          pytest tests/e2e.py -v
        env:
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
        timeout-minutes: 5

      - name: Evaluate language test results
        run: |
          # If detect itself failed, block the merge — don't let everything skipping look like a pass
          detect_result="${{ needs.detect.result }}"
          if [ "$detect_result" = "failure" ] || [ "$detect_result" = "cancelled" ]; then
            echo "❌ detect job $detect_result — cannot determine what changed"
            exit 1
          fi

          results=(
            "python:${{ needs.test-python.result }}"
            "javascript:${{ needs.test-javascript.result }}"
            "go:${{ needs.test-go.result }}"
            "dotnet:${{ needs.test-dotnet.result }}"
            "java:${{ needs.test-java.result }}"
            "rust:${{ needs.test-rust.result }}"
            "cli:${{ needs.test-cli.result }}"
          )
          FAILED=false
          for item in "${results[@]}"; do
            lang="${item%%:*}"
            result="${item##*:}"
            printf "%-12s %s\n" "${lang}:" "$result"
            [ "$result" = "failure" ] || [ "$result" = "cancelled" ] && FAILED=true
          done
          if [ "$FAILED" = "true" ]; then
            echo "❌ One or more recipe test jobs failed"
            exit 1
          fi
          echo "✅ All applicable recipe tests passed"
