name: Test JavaScript Samples

on:
  pull_request:
    paths:
      - 'samples/javascript/**'
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for examples
        id: check
        run: |
          if find samples/javascript -name "example.test.js" 2>/dev/null | grep -q .; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
            echo "No JavaScript examples found, skipping tests"
          fi

      - name: Install dependencies
        if: steps.check.outputs.has_tests == 'true'
        run: cd samples/javascript && npm install

      - name: Run tests
        if: steps.check.outputs.has_tests == 'true'
        run: cd samples/javascript && npm test
        env:
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
        timeout-minutes: 15
