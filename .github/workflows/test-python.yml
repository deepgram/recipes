name: Test Python Samples

on:
  pull_request:
    paths:
      - 'samples/python/**'
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check for examples
        id: check
        run: |
          if find samples/python -name "example_test.py" 2>/dev/null | grep -q .; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
            echo "No Python examples found, skipping tests"
          fi

      - name: Install dependencies
        if: steps.check.outputs.has_tests == 'true'
        run: |
          pip install --upgrade pip
          if [ -f samples/python/requirements.txt ]; then
            pip install -r samples/python/requirements.txt
          else
            echo "No requirements.txt found, installing pytest only"
            pip install pytest pytest-timeout
          fi

      - name: Run tests
        if: steps.check.outputs.has_tests == 'true'
        run: pytest samples/python/ -v --timeout=60 -x --import-mode=importlib
        env:
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
        timeout-minutes: 15
