name: Update Coverage

on:
  pull_request:
    types:
      - closed
    branches:
      - main
  schedule:
    # Cron fallback: GitHub will not fire pull_request.closed when a workflow
    # merges a PR using GITHUB_TOKEN (workflow→workflow event chain is blocked).
    # This cron ensures coverage stays current even when process-queue auto-merges
    # recipe PRs. The instruction is idempotent — commits nothing if up to date.
    - cron: '30 */6 * * *'  # Every 6 hours at :30
  workflow_dispatch:

concurrency:
  group: update-coverage
  cancel-in-progress: false

jobs:
  run:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "dx-recipes-bot"
          git config user.email "noreply@deepgram.com"

      - name: Run instruction
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-opus-4-6
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep"
          timeout_minutes: 10
          direct_prompt: "Read and execute instructions/update-coverage.md"
