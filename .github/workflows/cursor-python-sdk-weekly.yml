name: Weekly Python SDK examples regeneration

on:
  schedule:
    - cron: "0 3 * * 1" # Mondays 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: cursor-python-sdk-weekly
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install Cursor CLI
        run: |
          curl -fsSL https://cursor.sh/install-cli | bash
          echo "$HOME/.cursor/bin" >> $GITHUB_PATH

      - name: Run Cursor Agent to generate Python SDK example docs
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          set -euo pipefail
          DATE="$(date -u +%Y-%m-%d)"
          BRANCH="cursor/python-sdk-weekly-${DATE}"
          echo "BRANCH=${BRANCH}" >> $GITHUB_ENV
          git checkout -B "$BRANCH"
          cursor-agent -p --model gpt-5 "$(cat .cursor/commands/generate-python-sdk-examples.md)"

      - name: Commit, push, and open PR if changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          if ! git diff --quiet; then
            git add -A
            git commit -m "docs(python): regenerate Python SDK examples via Cursor Agent"
            git push -u origin HEAD
            if gh pr list --head "$BRANCH" --state open --json number --jq 'length' | grep -q '^0$'; then
              gh pr create --fill --title "Weekly: Update Python SDK examples" --head "$BRANCH"
            else
              echo "PR already exists for $BRANCH"
            fi
          else
            echo "No changes."
          fi
